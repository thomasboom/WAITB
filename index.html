<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAITB — Wordle AI Benchmark</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #1a1a1a;
            --paper: #f7f3ed;
            --paper-dark: #ede8e0;
            --accent: #c44536;
            --accent-light: #e8d5d1;
            --muted: #6b6560;
            --line: #d4cfc7;
            --win: #2d6a4f;
            --loss: #c44536;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            line-height: 1.5;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        header {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--line);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 400;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 0.5rem;
        }

        h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--paper);
            padding: 1.5rem;
            text-align: center;
        }

        .stat-card:first-child {
            border-radius: 8px 0 0 8px;
        }

        .stat-card:last-child {
            border-radius: 0 8px 8px 0;
        }

        .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.5rem;
            font-weight: 600;
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .chart-card {
            background: white;
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .chart-card h3 {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .results-table th {
            text-align: left;
            padding: 1rem 0.75rem;
            font-weight: 500;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            border-bottom: 2px solid var(--ink);
        }

        .results-table td {
            padding: 0.875rem 0.75rem;
            border-bottom: 1px solid var(--line);
            vertical-align: middle;
        }

        .results-table tr:hover td {
            background: var(--paper-dark);
        }

        .provider-badge {
            display: inline-block;
            background: var(--paper-dark);
            padding: 0.25rem 0.6rem;
            border-radius: 2px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .win { 
            color: var(--win); 
            font-weight: 600;
        }
        
        .loss { 
            color: var(--loss); 
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 6rem 2rem;
            color: var(--muted);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 4rem;
        }

        .loading-spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--line);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-state {
            text-align: center;
            padding: 4rem;
            color: var(--loss);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-card:first-child { border-radius: 4px 0 0 0; }
            .stat-card:nth-child(2) { border-radius: 0 4px 0 0; }
            .stat-card:nth-child(3) { border-radius: 0 0 0 4px; }
            .stat-card:last-child { border-radius: 0 0 4px 0; }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .results-table {
                font-size: 0.8rem;
            }
            
            .results-table th, .results-table td {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Wordle <em>AI</em> Benchmark</h1>
            <p class="subtitle">Performance tracking across providers</p>
        </header>

        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <span style="color: var(--muted); font-size: 0.9rem;">Loading results...</span>
        </div>

        <div id="errorState" class="error-state" style="display: none;">
            No results found. Add your CSV file to <code style="background: var(--paper-dark); padding: 0.2rem 0.4rem; border-radius: 2px;">results/waitb_results.csv</code>
        </div>

        <div id="results" style="display: none;">
            <div class="stats-grid" id="statsGrid"></div>
            
            <h2 class="section-title">Performance by Provider</h2>
            <div class="charts-grid">
                <div class="chart-card">
                    <h3>Win Rate</h3>
                    <canvas id="winRateChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Average Attempts</h3>
                    <canvas id="attemptsChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Average Time (seconds)</h3>
                    <canvas id="timeChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Games Over Time</h3>
                    <canvas id="timelineChart"></canvas>
                </div>
            </div>
            
            <h2 class="section-title">Game Log</h2>
            <table class="results-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Provider</th>
                        <th>Model</th>
                        <th>Word</th>
                        <th>Attempts</th>
                        <th>Result</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
        </div>
    </div>
    
    <script>
        let results = [];
        let charts = {};
        
        const colors = ['#1a1a1a', '#c44536', '#2d6a4f', '#457b9d', '#8338ec', '#ff6b6b'];
        
        Chart.defaults.font.family = "'DM Sans', sans-serif";
        Chart.defaults.color = '#6b6560';
        
        function parseCSV(text) {
            const lines = text.trim().split('\n');
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim());
                if (values.length < headers.length) continue;
                
                const row = {};
                headers.forEach((h, idx) => {
                    row[h] = values[idx];
                });
                
                row.attempts = parseInt(row.attempts) || 0;
                row.won = row.won === 'true';
                row.total_time = parseFloat(row.total_time) || 0;
                row.guess_times = row.guess_times ? row.guess_times.split(';').map(parseFloat) : [];
                
                data.push(row);
            }
            
            return data;
        }
        
        function renderResults() {
            if (results.length === 0) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
                return;
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('errorState').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            
            renderStats();
            renderCharts();
            renderTable();
        }
        
        function renderStats() {
            const total = results.length;
            const wins = results.filter(r => r.won).length;
            const winRate = total > 0 ? (wins / total * 100).toFixed(1) : 0;
            const avgAttempts = total > 0 ? (results.reduce((sum, r) => sum + r.attempts, 0) / total).toFixed(1) : 0;
            const avgTime = total > 0 ? (results.reduce((sum, r) => sum + r.total_time, 0) / total).toFixed(1) : 0;
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">Total Games</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${winRate}%</div>
                    <div class="stat-label">Win Rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgAttempts}</div>
                    <div class="stat-label">Avg Attempts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgTime}s</div>
                    <div class="stat-label">Avg Time</div>
                </div>
            `;
        }
        
        function renderCharts() {
            Object.values(charts).forEach(c => c.destroy());
            charts = {};
            
            const providers = [...new Set(results.map(r => r.provider))];
            const providerWins = {};
            const providerGames = {};
            const providerAttempts = {};
            const providerTime = {};
            
            providers.forEach(p => {
                providerWins[p] = 0;
                providerGames[p] = 0;
                providerAttempts[p] = 0;
                providerTime[p] = 0;
            });
            
            results.forEach(r => {
                providerGames[r.provider]++;
                if (r.won) providerWins[r.provider]++;
                providerAttempts[r.provider] += r.attempts;
                providerTime[r.provider] += r.total_time;
            });
            
            const winRates = providers.map(p => 
                providerGames[p] > 0 ? (providerWins[p] / providerGames[p] * 100).toFixed(1) : 0
            );
            const avgAttempts = providers.map(p => 
                providerGames[p] > 0 ? (providerAttempts[p] / providerGames[p]).toFixed(1) : 0
            );
            const avgTimes = providers.map(p => 
                providerGames[p] > 0 ? (providerTime[p] / providerGames[p]).toFixed(1) : 0
            );
            
            charts.winRate = new Chart(document.getElementById('winRateChart'), {
                type: 'bar',
                data: {
                    labels: providers,
                    datasets: [{
                        label: 'Win Rate (%)',
                        data: winRates,
                        backgroundColor: colors.slice(0, providers.length),
                        borderRadius: 2,
                        barThickness: 32,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            max: 100, 
                            grid: { color: '#d4cfc7' },
                            border: { display: false }
                        },
                        x: { 
                            grid: { display: false },
                            border: { display: false }
                        }
                    }
                }
            });
            
            charts.attempts = new Chart(document.getElementById('attemptsChart'), {
                type: 'bar',
                data: {
                    labels: providers,
                    datasets: [{
                        label: 'Avg Attempts',
                        data: avgAttempts,
                        backgroundColor: colors.slice(0, providers.length),
                        borderRadius: 2,
                        barThickness: 32,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: '#d4cfc7' },
                            border: { display: false }
                        },
                        x: { 
                            grid: { display: false },
                            border: { display: false }
                        }
                    }
                }
            });
            
            charts.time = new Chart(document.getElementById('timeChart'), {
                type: 'bar',
                data: {
                    labels: providers,
                    datasets: [{
                        label: 'Avg Time (s)',
                        data: avgTimes,
                        backgroundColor: colors.slice(0, providers.length),
                        borderRadius: 2,
                        barThickness: 32,
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            grid: { color: '#d4cfc7' },
                            border: { display: false }
                        },
                        x: { 
                            grid: { display: false },
                            border: { display: false }
                        }
                    }
                }
            });
            
            const sortedByDate = [...results].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            const gameNumbers = sortedByDate.map((_, i) => `Game ${i + 1}`);
            const gameResults = sortedByDate.map(r => r.won ? r.attempts : null);
            
            charts.timeline = new Chart(document.getElementById('timelineChart'), {
                type: 'line',
                data: {
                    labels: gameNumbers,
                    datasets: [{
                        label: 'Attempts',
                        data: sortedByDate.map(r => r.attempts),
                        borderColor: '#c44536',
                        backgroundColor: 'rgba(196, 69, 54, 0.08)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3,
                        pointBackgroundColor: '#c44536',
                    }]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            grid: { color: '#d4cfc7' },
                            border: { display: false }
                        },
                        x: { 
                            grid: { display: false },
                            border: { display: false },
                            ticks: { maxTicksLimit: 10 }
                        }
                    }
                }
            });
        }
        
        function renderTable() {
            const sorted = [...results].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            document.getElementById('resultsBody').innerHTML = sorted.map(r => {
                const date = new Date(r.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                return `
                    <tr>
                        <td>${date}</td>
                        <td><span class="provider-badge">${r.provider}</span></td>
                        <td>${r.model}</td>
                        <td><strong>${r.word}</strong></td>
                        <td>${r.attempts}</td>
                        <td class="${r.won ? 'win' : 'loss'}">${r.won ? 'WIN' : 'LOSS'}</td>
                        <td>${r.total_time.toFixed(1)}s</td>
                    </tr>
                `;
            }).join('');
        }
        
        fetch('results/waitb_results.csv')
            .then(r => {
                if (r.ok) return r.text();
                throw new Error('CSV not found');
            })
            .then(text => {
                results = parseCSV(text);
                renderResults();
            })
            .catch(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('errorState').style.display = 'block';
            });
    </script>
</body>
</html>
