<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WAITB — Wordle AI Benchmark</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --ink: #1a1a1a;
                --paper: #f7f3ed;
                --paper-dark: #ede8e0;
                --accent: #c44536;
                --accent-light: #e8d5d1;
                --muted: #6b6560;
                --line: #d4cfc7;
                --win: #2d6a4f;
                --loss: #c44536;
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --ink: #e8e6e3;
                    --paper: #1a1a1a;
                    --paper-dark: #2a2a2a;
                    --accent: #e06c5c;
                    --accent-light: #4a3a38;
                    --muted: #9a9590;
                    --line: #3a3a3a;
                    --win: #4a9f7f;
                    --loss: #e06c5c;
                    --chart-grid: #3a3a3a;
                    --chart-tooltip-bg: #2a2a2a;
                    --chart-tooltip-text: #e8e6e3;
                    --chart-bar-default: #e8e6e3;
                }
            }

            @media (prefers-color-scheme: light) {
                :root {
                    --chart-grid: #d4cfc7;
                    --chart-tooltip-bg: #fff;
                    --chart-tooltip-text: #1a1a1a;
                    --chart-bar-default: #1a1a1a;
                }
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "DM Sans", sans-serif;
                background: var(--paper);
                color: var(--ink);
                min-height: 100vh;
                line-height: 1.5;
            }

            .container {
                max-width: 1100px;
                margin: 0 auto;
                padding: 3rem 2rem;
            }

            header {
                margin-bottom: 3rem;
                padding-bottom: 2rem;
                border-bottom: 1px solid var(--line);
            }

            h1 {
                font-family: "Cormorant Garamond", serif;
                font-size: clamp(2.5rem, 6vw, 4rem);
                font-weight: 400;
                letter-spacing: -0.02em;
                line-height: 1.1;
                margin-bottom: 0.5rem;
            }

            h1 em {
                font-style: italic;
                color: var(--accent);
            }

            .subtitle {
                font-size: 0.95rem;
                color: var(--muted);
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }

            .stats-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 1px;
                background: var(--line);
                border: 1px solid var(--line);
                margin-bottom: 3rem;
            }

            .stat-card {
                background: var(--paper);
                padding: 1.5rem;
                text-align: center;
            }

            .stat-card:first-child {
                border-radius: 8px 0 0 8px;
            }

            .stat-card:last-child {
                border-radius: 0 8px 8px 0;
            }

            .stat-value {
                font-family: "Cormorant Garamond", serif;
                font-size: 2.5rem;
                font-weight: 600;
                line-height: 1;
                margin-bottom: 0.25rem;
            }

            .stat-label {
                font-size: 0.75rem;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.1em;
            }

            .section-title {
                font-family: "Cormorant Garamond", serif;
                font-size: 1.75rem;
                font-weight: 400;
                margin-bottom: 1.5rem;
                display: flex;
                align-items: center;
                gap: 1rem;
            }

            .section-title::after {
                content: "";
                flex: 1;
                height: 1px;
                background: var(--line);
            }

            .charts-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
                margin-bottom: 3rem;
            }

            .chart-card {
                background: var(--paper);
                border: 1px solid var(--line);
                border-radius: 4px;
                padding: 1.5rem;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
            }

            .chart-card h3 {
                font-size: 0.85rem;
                font-weight: 500;
                color: var(--muted);
                margin-bottom: 1rem;
                letter-spacing: 0.02em;
                text-align: center;
            }

            .results-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.9rem;
            }

            .results-table th {
                text-align: left;
                padding: 1rem 0.75rem;
                font-weight: 500;
                font-size: 0.75rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--muted);
                border-bottom: 2px solid var(--ink);
            }

            .results-table td {
                padding: 0.875rem 0.75rem;
                border-bottom: 1px solid var(--line);
                vertical-align: middle;
            }

            .results-table tr {
                cursor: pointer;
            }

            .results-table tr:hover td {
                background: var(--paper-dark);
            }

            .provider-badge {
                display: inline-block;
                background: var(--paper-dark);
                padding: 0.25rem 0.6rem;
                border-radius: 2px;
                font-size: 0.75rem;
                font-weight: 500;
                letter-spacing: 0.02em;
            }

            .win {
                color: var(--win);
                font-weight: 600;
            }

            .loss {
                color: var(--loss);
                font-weight: 600;
            }

            .empty-state {
                text-align: center;
                padding: 6rem 2rem;
                color: var(--muted);
            }

            .loading {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                padding: 4rem;
            }

            .loading-spinner {
                width: 24px;
                height: 24px;
                border: 2px solid var(--line);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .error-state {
                text-align: center;
                padding: 4rem;
                color: var(--loss);
            }

            @media (max-width: 768px) {
                .stats-grid {
                    grid-template-columns: repeat(2, 1fr);
                }

                .stat-card:first-child {
                    border-radius: 4px 0 0 0;
                }
                .stat-card:nth-child(2) {
                    border-radius: 0 4px 0 0;
                }
                .stat-card:nth-child(3) {
                    border-radius: 0 0 0 4px;
                }
                .stat-card:last-child {
                    border-radius: 0 0 4px 0;
                }

                .charts-grid {
                    grid-template-columns: 1fr;
                }

                .results-table {
                    font-size: 0.8rem;
                }

                .results-table th,
                .results-table td {
                    padding: 0.5rem;
                }
            }

            .modal-overlay {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.5);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                opacity: 0;
                visibility: hidden;
                transition: opacity 0.2s, visibility 0.2s;
            }

            .modal-overlay.active {
                opacity: 1;
                visibility: visible;
            }

            .modal {
                background: var(--paper);
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 2rem;
                max-width: 500px;
                width: 90%;
                max-height: 80vh;
                overflow-y: auto;
                transform: scale(0.95);
                transition: transform 0.2s;
            }

            .modal-overlay.active .modal {
                transform: scale(1);
            }

            .modal-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 1.5rem;
                padding-bottom: 1rem;
                border-bottom: 1px solid var(--line);
            }

            .modal-title {
                font-family: "Cormorant Garamond", serif;
                font-size: 1.5rem;
                font-weight: 600;
            }

            .modal-close {
                background: none;
                border: none;
                font-size: 1.5rem;
                cursor: pointer;
                color: var(--muted);
                padding: 0.25rem;
                line-height: 1;
            }

            .modal-close:hover {
                color: var(--ink);
            }

            .modal-meta {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
                margin-bottom: 1.5rem;
            }

            .modal-meta-item {
                font-size: 0.85rem;
            }

            .modal-meta-label {
                color: var(--muted);
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.08em;
            }

            .modal-meta-value {
                font-weight: 500;
            }

            .guess-grid {
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }

            .guess-row {
                display: flex;
                align-items: center;
                gap: 1rem;
                padding: 0.5rem;
                background: var(--paper-dark);
                border-radius: 4px;
            }

            .guess-num {
                font-size: 0.75rem;
                font-weight: 600;
                color: var(--muted);
                width: 24px;
            }

            .guess-word {
                font-family: "DM Sans", monospace;
                font-size: 1.1rem;
                font-weight: 600;
                letter-spacing: 0.1em;
            }

            .guess-feedback {
                font-family: "DM Sans", monospace;
                font-size: 0.9rem;
                letter-spacing: 0.15em;
            }

            .guess-time {
                margin-left: auto;
                font-size: 0.8rem;
                color: var(--muted);
            }

            .tile {
                display: inline-block;
                width: 28px;
                height: 28px;
                line-height: 28px;
                text-align: center;
                font-weight: 600;
                font-size: 0.9rem;
                border-radius: 2px;
                margin-right: 2px;
            }

            .tile.correct {
                background: var(--win);
                color: white;
            }

            .tile.present {
                background: #e9c46a;
                color: #1a1a1a;
            }

            .tile.absent {
                background: var(--muted);
                color: white;
            }

            .target-word {
                margin-top: 1rem;
                padding-top: 1rem;
                border-top: 1px solid var(--line);
                font-size: 0.85rem;
                color: var(--muted);
            }

            .target-word strong {
                color: var(--ink);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Wordle <em>AI</em> Benchmark</h1>
                <p class="subtitle">Performance tracking across providers</p>
            </header>

            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <span style="color: var(--muted); font-size: 0.9rem"
                    >Loading results...</span
                >
            </div>

            <div id="errorState" class="error-state" style="display: none">
                No results found. Add your CSV file to
                <code
                    style="
                        background: var(--paper-dark);
                        padding: 0.2rem 0.4rem;
                        border-radius: 2px;
                    "
                    >results/waitb_results.csv</code
                >
            </div>

            <div id="results" style="display: none">
                <div class="stats-grid" id="statsGrid"></div>

                <h2 class="section-title">Guesses by Model</h2>
                <div class="charts-grid" style="grid-template-columns: 1fr">
                    <div class="chart-card" style="height: 600px">
                        <h3>Attempts per Game by Model</h3>
                        <canvas id="attemptsChart"></canvas>
                    </div>
                </div>

                <h2 class="section-title">Game Log</h2>
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Provider</th>
                            <th>Model</th>
                            <th>Word</th>
                            <th>Attempts</th>
                            <th>Result</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
        </div>

        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-header">
                    <div class="modal-title">Game Details</div>
                    <button class="modal-close" id="modalClose">&times;</button>
                </div>
                <div id="modalContent"></div>
            </div>
        </div>

        <script>
            let results = [];
            let games = {};
            let isNewFormat = false;
            let charts = {};

            const colors = [
                "#1a1a1a",
                "#c44536",
                "#2d6a4f",
                "#457b9d",
                "#8338ec",
                "#ff6b6b",
            ];

            Chart.defaults.font.family = "'DM Sans', sans-serif";
            Chart.defaults.color = "#6b6560";

            function parseCSV(text) {
                const lines = text.trim().split("\n");
                if (lines.length < 2) return [];

                const headers = lines[0].split(",").map((h) => h.trim());
                isNewFormat = headers.includes("try_num") && headers.includes("guess");
                
                const data = [];
                games = {};

                for (let i = 1; i < lines.length; i++) {
                    const values = parseCSVLine(lines[i], headers);
                    if (!values) continue;

                    if (isNewFormat) {
                        const gameId = values.game_id || `game_${i}`;
                        if (!games[gameId]) {
                            games[gameId] = {
                                game_id: gameId,
                                timestamp: values.timestamp,
                                provider: values.provider,
                                model: values.model,
                                word: values.word,
                                attempts: parseInt(values.attempts) || 0,
                                won: values.won && values.won.toLowerCase() === "true",
                                total_time: parseFloat(values.total_time) || 0,
                                guesses: [],
                            };
                        }
                        if (values.try_num) {
                            games[gameId].guesses.push({
                                num: parseInt(values.try_num),
                                word: values.guess,
                                feedback: values.feedback,
                                time: parseFloat(values.guess_time) || 0,
                            });
                        }
                    } else {
                        values.attempts = parseInt(values.attempts) || 0;
                        values.won = values.won && values.won.toLowerCase() === "true";
                        values.total_time = parseFloat(values.total_time) || 0;
                        values.guess_times = values.guess_times
                            ? values.guess_times.split(";").map(parseFloat)
                            : [];
                        data.push(values);
                    }
                }

                if (isNewFormat) {
                    Object.values(games).forEach(g => {
                        g.guesses.sort((a, b) => a.num - b.num);
                        data.push(g);
                    });
                }

                return data;
            }

            function parseCSVLine(line, headers) {
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                
                if (values.length < headers.length) return null;
                
                const row = {};
                headers.forEach((h, idx) => {
                    row[h] = values[idx] || '';
                });
                return row;
            }

            function renderResults() {
                if (results.length === 0) {
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("errorState").style.display =
                        "block";
                    return;
                }

                document.getElementById("loading").style.display = "none";
                document.getElementById("errorState").style.display = "none";
                document.getElementById("results").style.display = "block";

                renderStats();
                renderCharts();
                renderTable();
            }

            function renderStats() {
                const total = results.length;
                const wins = results.filter((r) => r.won).length;
                const winRate =
                    total > 0 ? ((wins / total) * 100).toFixed(1) : 0;
                const avgAttempts =
                    total > 0
                        ? (
                              results.reduce((sum, r) => sum + (r.attempts || 0), 0) /
                              total
                          ).toFixed(1)
                        : 0;
                const totalModels = [...new Set(results.map((r) => r.model).filter(Boolean))]
                    .length;

                document.getElementById("statsGrid").innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${total}</div>
                    <div class="stat-label">Total Games</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${winRate}%</div>
                    <div class="stat-label">Win Rate</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${avgAttempts}</div>
                    <div class="stat-label">Avg Attempts</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${totalModels}</div>
                    <div class="stat-label">Models</div>
                </div>
            `;
            }

            function renderCharts() {
                try {
                    Object.values(charts).forEach((c) => c.destroy());
                    charts = {};

                    const modelStats = {};

                    results.forEach((r) => {
                        if (!modelStats[r.model]) {
                            modelStats[r.model] = {
                                totalAttempts: 0,
                                games: 0,
                                wins: 0,
                                provider: r.provider,
                            };
                        }
                        modelStats[r.model].totalAttempts += r.attempts;
                        modelStats[r.model].games += 1;
                        if (r.won) modelStats[r.model].wins += 1;
                    });

                    const models = Object.keys(modelStats);
                    if (models.length === 0) return;

                    const avgAttempts = models.map((m) =>
                        Math.round(
                            modelStats[m].totalAttempts / modelStats[m].games,
                        ),
                    );

                    const isDarkMode = window.matchMedia(
                        "(prefers-color-scheme: dark)",
                    ).matches;

                    const lightPalette = [
                        "#1a1a1a",
                        "#c44536",
                        "#2d6a4f",
                        "#457b9d",
                        "#8338ec",
                        "#ff6b6b",
                        "#f4a261",
                        "#e76f51",
                        "#264653",
                        "#a8dadc",
                    ];
                    const darkPalette = [
                        "#e8e6e3",
                        "#e06c5c",
                        "#4a9f7f",
                        "#5b9dc9",
                        "#9d5dff",
                        "#ff8b8b",
                        "#f4b671",
                        "#f48b6b",
                        "#3b6d7f",
                        "#b8e8f0",
                    ];
                    const palette = isDarkMode ? darkPalette : lightPalette;

                    const barColors = models.map((m, i) => {
                        const isAllWins =
                            modelStats[m].wins === modelStats[m].games;
                        return isAllWins
                            ? palette[i % palette.length]
                            : isDarkMode
                              ? "#666666"
                              : "#cccccc";
                    });
                    const tooltipBorderColors = models.map(
                        (m, i) => palette[i % palette.length],
                    );

                    charts.attempts = new Chart(
                        document.getElementById("attemptsChart"),
                        {
                            type: "bar",
                            data: {
                                labels: models,
                                datasets: [
                                    {
                                        label: "Avg Attempts",
                                        data: avgAttempts,
                                        backgroundColor: barColors,
                                        borderColor: barColors,
                                        borderWidth: 2,
                                        borderRadius: 3,
                                        barThickness: 40,
                                    },
                                ],
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                indexAxis: "x",
                                plugins: {
                                    legend: { display: false },
                                    tooltip: {
                                        backgroundColor:
                                            getComputedStyle(
                                                document.documentElement,
                                            )
                                                .getPropertyValue(
                                                    "--chart-tooltip-bg",
                                                )
                                                .trim() || "#fff",
                                        titleColor:
                                            getComputedStyle(
                                                document.documentElement,
                                            )
                                                .getPropertyValue(
                                                    "--chart-tooltip-text",
                                                )
                                                .trim() || "#1a1a1a",
                                        bodyColor:
                                            getComputedStyle(
                                                document.documentElement,
                                            )
                                                .getPropertyValue(
                                                    "--chart-tooltip-text",
                                                )
                                                .trim() || "#1a1a1a",
                                        borderColor: (context) =>
                                            tooltipBorderColors[
                                                context.dataIndex
                                            ] || "#1a1a1a",
                                        borderWidth: 2,
                                        cornerRadius: 4,
                                        displayColors: false,
                                        callbacks: {
                                            afterLabel: function (context) {
                                                const model =
                                                    models[context.dataIndex];
                                                const stats = modelStats[model];
                                                return [
                                                    stats.provider,
                                                    `Games: ${stats.games}`,
                                                    `Wins: ${stats.wins}`,
                                                ];
                                            },
                                        },
                                    },
                                },
                                scales: {
                                    y: {
                                        beginAtZero: true,
                                        max: 7,
                                        grid: {
                                            color:
                                                getComputedStyle(
                                                    document.documentElement,
                                                )
                                                    .getPropertyValue(
                                                        "--chart-grid",
                                                    )
                                                    .trim() || "#d4cfc7",
                                        },
                                        border: { display: false },
                                        title: {
                                            display: true,
                                            text: "Avg Guesses",
                                            font: { weight: "500" },
                                        },
                                    },
                                    x: {
                                        grid: { display: false },
                                        border: { display: false },
                                        ticks: {
                                            maxRotation: 45,
                                            minRotation: 45,
                                            font: { size: 11 },
                                        },
                                    },
                                },
                            },
                        },
                    );
                } catch (e) {
                    console.error("Error rendering charts:", e);
                }
            }

            function renderTable() {
                const sorted = [...results].sort(
                    (a, b) => new Date(b.timestamp) - new Date(a.timestamp),
                );

                document.getElementById("resultsBody").innerHTML = sorted
                    .map((r, idx) => {
                        const date = new Date(r.timestamp).toLocaleDateString(
                            "en-US",
                            { month: "short", day: "numeric", year: "numeric" },
                        );
                        const gameId = r.game_id || `game_${idx}`;
                        return `
                    <tr data-game-id="${gameId}" onclick="showGameDetails('${gameId}')">
                        <td>${date}</td>
                        <td><span class="provider-badge">${r.provider}</span></td>
                        <td>${r.model}</td>
                        <td><strong>${r.word}</strong></td>
                        <td>${r.attempts}</td>
                        <td class="${r.won ? "win" : "loss"}">${r.won ? "WIN" : "LOSS"}</td>
                        <td>${r.total_time.toFixed(1)}s</td>
                    </tr>
                `;
                    })
                    .join("");
            }

            function showGameDetails(gameId) {
                const game = games[gameId];
                if (!game) return;

                const date = new Date(game.timestamp).toLocaleDateString(
                    "en-US",
                    { month: "short", day: "numeric", year: "numeric" },
                );
                const time = new Date(game.timestamp).toLocaleTimeString(
                    "en-US",
                    { hour: "2-digit", minute: "2-digit" },
                );

                let guessesHtml = '';
                
                if (isNewFormat && game.guesses && game.guesses.length > 0) {
                    guessesHtml = `<div class="guess-grid">
                        ${game.guesses.map(g => `
                            <div class="guess-row">
                                <span class="guess-num">${g.num}</span>
                                <span class="guess-word">${renderTiles(g.word, g.feedback, game.word)}</span>
                                <span class="guess-time">${g.time.toFixed(1)}s</span>
                            </div>
                        `).join('')}
                    </div>`;
                } else if (game.guess_times && game.guess_times.length > 0) {
                    guessesHtml = `<p style="color: var(--muted); font-size: 0.85rem;">Individual guess data not available (old format)</p>`;
                } else {
                    guessesHtml = `<p style="color: var(--muted); font-size: 0.85rem;">No guess data available</p>`;
                }

                document.getElementById("modalContent").innerHTML = `
                    <div class="modal-meta">
                        <div class="modal-meta-item">
                            <div class="modal-meta-label">Date</div>
                            <div class="modal-meta-value">${date}</div>
                        </div>
                        <div class="modal-meta-item">
                            <div class="modal-meta-label">Time</div>
                            <div class="modal-meta-value">${time}</div>
                        </div>
                        <div class="modal-meta-item">
                            <div class="modal-meta-label">Provider</div>
                            <div class="modal-meta-value">${game.provider}</div>
                        </div>
                        <div class="modal-meta-item">
                            <div class="modal-meta-label">Model</div>
                            <div class="modal-meta-value">${game.model}</div>
                        </div>
                        <div class="modal-meta-item">
                            <div class="modal-meta-label">Result</div>
                            <div class="modal-meta-value ${game.won ? 'win' : 'loss'}">${game.won ? 'WIN' : 'LOSS'}</div>
                        </div>
                        <div class="modal-meta-item">
                            <div class="modal-meta-label">Total Time</div>
                            <div class="modal-meta-value">${game.total_time.toFixed(1)}s</div>
                        </div>
                    </div>
                    <h4 style="font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem;">Guesses</h4>
                    ${guessesHtml}
                    <div class="target-word">
                        Target word: <strong>${game.word}</strong>
                    </div>
                `;

                document.getElementById("modalOverlay").classList.add("active");
            }

            function renderTiles(guess, feedback, target) {
                if (!guess || !feedback) return guess || '';
                
                let html = '';
                for (let i = 0; i < guess.length; i++) {
                    const letter = guess[i];
                    const fb = feedback[i] || '_';
                    let cls = 'absent';
                    if (fb === 'G') cls = 'correct';
                    else if (fb === 'Y') cls = 'present';
                    html += `<span class="tile ${cls}">${letter}</span>`;
                }
                return html;
            }

            function closeModal() {
                document.getElementById("modalOverlay").classList.remove("active");
            }

            document.getElementById("modalClose").addEventListener("click", closeModal);
            document.getElementById("modalOverlay").addEventListener("click", (e) => {
                if (e.target === document.getElementById("modalOverlay")) {
                    closeModal();
                }
            });
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closeModal();
            });

            fetch("results/waitb_results.csv")
                .then((r) => {
                    if (r.ok) return r.text();
                    throw new Error("CSV not found");
                })
                .then((text) => {
                    results = parseCSV(text);
                    renderResults();
                })
                .catch(() => {
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("errorState").style.display =
                        "block";
                });
        </script>
    </body>
</html>
